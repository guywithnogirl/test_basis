name: Deploy React to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
      - run: npm run build
      - name: Show Github OIDC Context
        run:
            echo "repository=${{ github.repository }}"
            echo "ref=${{ github.ref }}"
      - name: Inspect OIDC token claims
        shell: bash
        run: |
          TOKEN_RESPONSE=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")

          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.value')

          echo "$TOKEN" \
            | cut -d '.' -f2 \
            | base64 -d 2>/dev/null \
            | jq '{iss, aud, sub, repository, ref}'
          
            
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::067712566220:role/deployreacttoggyr
          aws-region: eu-north-1

      - run: aws s3 sync dist/ s3://gg-myr --delete